# Render Blueprint — deploys BodyMind as ONE service (Express serves the API AND
# the built React frontend) plus a free Postgres. See DEPLOY.md for the clicks.

services:
  - type: web
    name: bodymind
    runtime: node
    plan: free
    # Install frontend deps, build the React app (dist/), then install backend deps.
    buildCommand: npm install --include=dev && npm run build && npm install --prefix server
    # One server serves the API and the static frontend.
    startCommand: node server/index.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon (free external Postgres) connection string here
      - key: GEMINI_API_KEY
        sync: false # paste your Gemini key in the Render dashboard
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: DB_SSL
        value: "true" # external Postgres (Neon) needs SSL
      - key: NODE_VERSION
        value: "20"
